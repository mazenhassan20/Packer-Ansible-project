---
- name: Configure HAProxy Load Balancer
  hosts: lb
  become: yes

  tasks:
    - name: Deploy HAProxy configuration
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log /dev/log local0
              log /dev/log local1 notice
              chroot /var/lib/haproxy
              stats socket /run/haproxy/admin.sock mode 660 level admin
              stats timeout 30s
              user haproxy
              group haproxy
              daemon

          defaults
              log global
              mode http
              option httplog
              option dontlognull
              timeout connect 5000
              timeout client  50000
              timeout server  50000

          frontend http_front
              bind *:80
              default_backend http_back

          backend http_back
              mode http
              balance roundrobin
              option http-server-close
              option forwardfor
              server web1 10.0.1.5:80 check inter 2s rise 2 fall 3
              server web2 10.0.1.4:80 check inter 2s rise 2 fall 3

          listen stats
              bind *:8080
              stats enable
              stats uri /stats
              stats refresh 10s
        validate: haproxy -c -f %s
      notify: restart haproxy

  handlers:
    - name: restart haproxy
      systemd:
        name: haproxy
        state: restarted
        enabled: yes
        daemon_reload: yes
